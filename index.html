<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>수성 스튜디오 포트폴리오</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
    <style>
        /* 기존 수성님의 스타일 유지 */
        body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#fafafa; margin:0; padding:40px 12px; color:#222; text-align:center; }
        .page{ max-width:680px; margin:auto; display:flex; flex-direction:column; gap:28px; }
        .card{ background:#fff; border-radius:18px; padding:28px 22px; box-shadow:0 6px 30px rgba(0,0,0,0.06); }
        .card-title{ font-size:20px; font-weight:700; margin-bottom:14px; }
        .divider{ height:1px; background:#eee; margin-bottom:20px; }
        p{line-height:1.8;}
        .sample{ width:120px; height:120px; background:#f3f3f3; border-radius:12px; margin:auto; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; }
        .sample img{ width:100%; height:100%; object-fit:contain; }
        .process{ display:flex; justify-content:center; align-items:center; gap:10px; flex-wrap:wrap; }
        .step{font-weight:600;} .icon{font-size:24px;margin-bottom:6px;} .arrow{font-size:18px;color:#aaa;}
        .process-note{ margin-top:22px; font-size:14px; color:#777; }
        .pixel-box{ display:flex; justify-content:center; gap:40px; flex-wrap:wrap; }
        .notice-list{ list-style:none; padding:0; }
        .notice-list li{ margin:12px 0; }
        .portfolio-filter{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
        .portfolio-filter button{ padding:6px 12px; border-radius:20px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:14px; }
        .portfolio-filter button.active{ background:#222; color:#fff; border-color:#222; }
        #adminPanel{ display:none; gap:10px; flex-wrap:wrap; justify-content:center; margin:10px 0 14px; }
        #adminPanel button{ padding:6px 12px; border-radius:20px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:13px; }
        .portfolio-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
        .portfolio-item{ aspect-ratio:1; background:#f3f3f3; border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .portfolio-item img{ width:100%; height:100%; object-fit:contain; }
    </style>
</head>

<body>
<div class="page">

    <div class="card" onclick="adminTap()">
        <div class="card-title">작업경력</div>
        <div class="divider"></div>
        <div class="sample">🎨</div>
        <p>
            현재까지 총 600건 이상의 구독뱃지 제작 경험으로<br>
            작은 사이즈에서도 잘 보이도록 가시성과 디테일을 고려한 도트 작업물을 제작합니다.<br>
            궁금하신 점은 편하게 문의 주세요!
        </p>
    </div>

    <div class="card">
        <div class="card-title">포트폴리오</div>
        <div class="divider"></div>

        <div class="portfolio-filter">
            <button onclick="setView('all', this)" class="active">전체</button>
            <button onclick="setView('animal', this)">동물</button>
            <button onclick="setView('character', this)">캐릭터</button>
            <button onclick="setView('etc', this)">기타</button>
        </div>

        <div id="adminPanel">
            <button onclick="triggerUpload('animal')">+ 동물 추가</button>
            <button onclick="triggerUpload('character')">+ 캐릭터 추가</button>
            <button onclick="triggerUpload('etc')">+ 기타 추가</button>
        </div>

        <div class="portfolio-grid" id="portfolio">
            </div>
    </div>
</div>

<script>
/* =========================
   수퍼베이스 설정
========================= */
const SUPABASE_URL = 'https://zeghlvabmzyjtgiaadjb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6Q8C9YaPw6tjdRdQ753DXQ_elp9TDY7';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentView = "all";
let adminMode = false;

/* =========================
   이미지 불러오기 (서버 연동)
========================= */
async function refreshView() {
    const grid = document.getElementById("portfolio");
    grid.innerHTML = "로드 중...";

    // Storage에서 파일 목록 가져오기
    const { data, error } = await _supabase.storage.from('portfolio').list('', {
        sortBy: { column: 'name', order: 'desc' }
    });

    if (error) {
        grid.innerHTML = "이미지를 불러오지 못했습니다.";
        return;
    }

    grid.innerHTML = "";
    
    // 필터링 로직: 파일명에 포함된 태그(animal_, char_, etc_)로 구분
    const filteredData = data.filter(file => {
        if (currentView === "all") return true;
        if (currentView === "animal") return file.name.startsWith("animal_");
        if (currentView === "character") return file.name.startsWith("char_");
        if (currentView === "etc") return file.name.startsWith("etc_");
        return true;
    });

    filteredData.forEach(file => {
        const imgUrl = `${SUPABASE_URL}/storage/v1/object/public/portfolio/${file.name}`;
        grid.innerHTML += `
            <div class="portfolio-item">
                <img src="${imgUrl}" loading="lazy">
            </div>
        `;
    });
}

/* =========================
   이미지 업로드 (서버 저장)
========================= */
function triggerUpload(type) {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 파일명 규칙: 카테고리_시간_이름
        const prefix = type === "character" ? "char_" : type + "_";
        const fileName = `${prefix}${Date.now()}_${file.name}`;

        const { data, error } = await _supabase.storage
            .from('portfolio')
            .upload(fileName, file);

        if (error) {
            alert("업로드 실패! (수퍼베이스 정책을 확인하세요)");
        } else {
            alert("서버 저장 완료!");
            refreshView();
        }
    };
    input.click();
}

/* =========================
   관리자/필터 기능 제어
========================= */
function adminTap() {
    // 3번 클릭 시 관리자 모드 활성화 (기존 로직 유지)
    toggleAdmin(); 
}

function toggleAdmin() {
    adminMode = !adminMode;
    document.getElementById("adminPanel").style.display = adminMode ? "flex" : "none";
}

function setView(type, el) {
    currentView = type;
    document.querySelectorAll(".portfolio-filter button").forEach(btn => btn.classList.remove("active"));
    el.classList.add("active");
    refreshView();
}

// 첫 실행
refreshView();
</script>
</body>
</html>
